<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 网关 Demo</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main>
    <h1>AI 网关 Entry 面板</h1>

    <section id="summary" class="cards"></section>

    <h2>按来源统计</h2>
    <table id="source-stats">
      <thead><tr><th>来源</th><th>Entry 数</th><th>输入 Token</th><th>输出 Token</th><th>Avg TTFB (s)</th><th>Avg TTFT (s)</th><th>Avg Latency (s)</th></tr></thead>
      <tbody></tbody>
    </table>

    <h2>Entry 列表</h2>
    <table id="entries">
      <thead><tr><th>ID</th><th>来源</th><th>开始时间(相对 pcap 起点, s)</th><th>TTFB (s)</th><th>TTFT (s)</th><th>Latency (s)</th><th>TPOT (s/token)</th><th>输入Token</th><th>输出Token</th><th>Flow</th></tr></thead>
      <tbody></tbody>
    </table>
  </main>

  <script>
    function card(title, value){
      return `<div class="card"><h3>${title}</h3><p>${value}</p></div>`;
    }

    function sec(v){
      if (v === null || v === undefined) return '-';
      return Number(v).toFixed(3);
    }

    async function refresh(){
      const [statsRes, entriesRes] = await Promise.all([
        fetch('/api/stats'),
        fetch('/api/entries')
      ]);
      const stats = await statsRes.json();
      const entries = await entriesRes.json();

      document.getElementById('summary').innerHTML = [
        card('总 Entry 数', stats.total_entries),
        card('总输入 Token', stats.total_input_tokens),
        card('总输出 Token', stats.total_output_tokens),
        card('RPS (req/s)', stats.rps),
      ].join('');

      const sourceRows = (stats.source_stats || []).map(s =>
        `<tr><td>${s.source}</td><td>${s.total_entries}</td><td>${s.total_input_tokens}</td><td>${s.total_output_tokens}</td><td>${sec(s.avg_ttfb)}</td><td>${sec(s.avg_ttft)}</td><td>${sec(s.avg_latency)}</td></tr>`
      ).join('');
      document.querySelector('#source-stats tbody').innerHTML = sourceRows;

      const entryRows = (entries.items || []).map(e =>
        `<tr><td>${e.id}</td><td>${e.source}</td><td>${sec(e.start_time)}</td><td>${sec(e.ttfb)}</td><td>${sec(e.ttft)}</td><td>${sec(e.latency)}</td><td>${sec(e.tpot)}</td><td>${e.input_tokens}</td><td>${e.output_tokens}</td><td>${e.flow_key}</td></tr>`
      ).join('');
      document.querySelector('#entries tbody').innerHTML = entryRows;
    }
    refresh();
  </script>
</body>
</html>
