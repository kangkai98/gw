<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Gateway Console</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="bg-blur orb-1"></div>
  <div class="bg-blur orb-2"></div>
  <main class="shell">
    <header class="top glass">
      <div>
        <h1>AI Gateway Console</h1>
        <p>无需 npm 构建 · 直接上传 PCAP · 自动分类与统计</p>
      </div>
      <div class="actions">
        <button id="refresh-btn" aria-label="刷新数据">刷新</button>
      </div>
    </header>

    <section id="summary" class="stats-grid"></section>

    <section class="grid-two">
      <article class="glass card">
        <h2>上传与数据管理</h2>
        <form id="upload-form" class="stack">
          <label>PCAP 文件
            <input aria-label="上传 pcap 文件" required type="file" name="file" accept=".pcap,.pcapng" />
          </label>
          <div class="inline-btns">
            <button aria-label="上传并分析" type="submit" class="btn-primary">上传并分析</button>
            <button aria-label="清空 entry 记录" type="button" id="clear-entry-btn" class="btn-danger">清空记录</button>
          </div>
        </form>
      </article>

      <article class="glass card">
        <h2>自建 AI 配置</h2>
        <form id="cfg-form" class="stack">
          <label>小类名称
            <input aria-label="自建 AI 小类名称" name="name" required placeholder="如：小微助手" />
          </label>
          <label>服务端 IP
            <input aria-label="自建 AI 服务端 IP" name="server_ip" required placeholder="如：192.168.101.1" />
          </label>
          <div class="inline-btns">
            <button aria-label="保存自建配置" type="submit" class="btn-primary">保存</button>
            <button aria-label="清空自建配置" type="button" id="clear-cfg-btn" class="btn-warn">清空配置</button>
          </div>
        </form>
        <div class="table-wrap small">
          <table id="cfg-table">
            <thead><tr><th>ID</th><th>小类</th><th>IP</th><th>操作</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </article>
    </section>

    <section class="grid-two">
      <article class="glass card">
        <h2>分类分布</h2>
        <div id="donut-chart" class="chart donut"></div>
        <div id="donut-legend" class="legend"></div>
      </article>
      <article class="glass card">
        <h2>各分类平均时延（ms）</h2>
        <div id="bar-chart" class="chart bars"></div>
      </article>
    </section>

    <article class="glass card">
      <h2>按大类统计</h2>
      <div class="table-wrap">
        <table id="major-stats">
          <thead><tr><th>大类</th><th>Entry数</th><th>输入Token</th><th>输出Token</th><th>Avg TTFB (ms)</th><th>Avg TTFT (ms)</th><th>Avg Latency (ms)</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </article>

    <article class="glass card">
      <h2>Entry 列表</h2>
      <div class="table-wrap">
        <table id="entries">
          <thead>
            <tr>
              <th>ID</th><th>大类</th><th>小类</th><th>开始时间</th><th>结束时间</th>
              <th>开始相对(s)</th><th>TTFB(ms)</th><th>TTFT(ms)</th><th>Latency(ms)</th><th>TPOT(ms/token)</th>
              <th>输入</th><th>输出</th><th>Flow</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <p id="op-msg" class="hint" aria-live="polite"></p>
    </article>
  </main>

  <script>
    const fmt = (v) => (v === null || v === undefined) ? '-' : Number(v).toFixed(1);
    const esc = (s) => String(s ?? '');

    function statCard(title, value){
      return `<article class="glass stat"><h3>${title}</h3><p>${value}</p></article>`;
    }

    async function loadConfigs(){
      const res = await fetch('/api/self-hosted');
      const data = await res.json();
      document.querySelector('#cfg-table tbody').innerHTML = (data.items || []).map(c =>
        `<tr><td>${c.id}</td><td>${esc(c.name)}</td><td>${esc(c.server_ip)}</td><td><button aria-label="删除配置${esc(c.name)}" data-del="${c.id}" class="table-btn">删除</button></td></tr>`
      ).join('');
      document.querySelectorAll('[data-del]').forEach(btn => {
        btn.onclick = async () => {
          await fetch(`/api/self-hosted/${btn.dataset.del}`, {method: 'DELETE'});
          await loadConfigs();
        };
      });
    }

    function renderDonut(majorStats){
      const total = majorStats.reduce((acc, s) => acc + Number(s.total_entries || 0), 0);
      const colors = ['#60a5fa', '#34d399', '#f59e0b', '#f472b6', '#a78bfa'];
      if (!total) {
        document.getElementById('donut-chart').innerHTML = '<div class="empty">暂无数据</div>';
        document.getElementById('donut-legend').innerHTML = '';
        return;
      }

      let accum = 0;
      const parts = majorStats.map((s, i) => {
        const pct = Number(s.total_entries || 0) / total;
        const start = accum * 360;
        const end = (accum + pct) * 360;
        accum += pct;
        return `${colors[i % colors.length]} ${start}deg ${end}deg`;
      });

      document.getElementById('donut-chart').innerHTML = `
        <div class="donut-core" style="background: conic-gradient(${parts.join(',')});">
          <div class="donut-hole">${total}<span>entries</span></div>
        </div>
      `;
      document.getElementById('donut-legend').innerHTML = majorStats.map((s, i) =>
        `<div><span class="dot" style="background:${colors[i % colors.length]}"></span>${esc(s.category_major)} (${s.total_entries})</div>`
      ).join('');
    }

    function renderBars(majorStats){
      const maxLatency = Math.max(...majorStats.map(x => Number(x.avg_latency_ms || 0)), 1);
      if (!majorStats.length) {
        document.getElementById('bar-chart').innerHTML = '<div class="empty">暂无数据</div>';
        return;
      }
      const rows = majorStats.map((s) => {
        const w1 = (Number(s.avg_ttfb_ms || 0) / maxLatency) * 100;
        const w2 = (Number(s.avg_ttft_ms || 0) / maxLatency) * 100;
        const w3 = (Number(s.avg_latency_ms || 0) / maxLatency) * 100;
        return `
          <div class="bar-row">
            <div class="bar-name">${esc(s.category_major)}</div>
            <div class="bar-set">
              <div class="bar b1" style="width:${w1}%">TTFB ${fmt(s.avg_ttfb_ms)}</div>
              <div class="bar b2" style="width:${w2}%">TTFT ${fmt(s.avg_ttft_ms)}</div>
              <div class="bar b3" style="width:${w3}%">LAT ${fmt(s.avg_latency_ms)}</div>
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('bar-chart').innerHTML = rows;
    }

    async function refresh(){
      const [statsRes, entriesRes] = await Promise.all([fetch('/api/stats'), fetch('/api/entries')]);
      const stats = await statsRes.json();
      const entries = await entriesRes.json();

      document.getElementById('summary').innerHTML = [
        statCard('总 Entry', stats.total_entries),
        statCard('总输入 Token', stats.total_input_tokens),
        statCard('总输出 Token', stats.total_output_tokens),
        statCard('RPS (req/s)', fmt(stats.rps)),
      ].join('');

      const majorStats = stats.major_stats || [];
      renderDonut(majorStats);
      renderBars(majorStats);

      document.querySelector('#major-stats tbody').innerHTML = majorStats.map(s =>
        `<tr><td>${esc(s.category_major)}</td><td>${s.total_entries}</td><td>${s.total_input_tokens}</td><td>${s.total_output_tokens}</td><td>${fmt(s.avg_ttfb_ms)}</td><td>${fmt(s.avg_ttft_ms)}</td><td>${fmt(s.avg_latency_ms)}</td></tr>`
      ).join('');

      document.querySelector('#entries tbody').innerHTML = (entries.items || []).map(e =>
        `<tr><td>${e.id}</td><td>${esc(e.category_major)}</td><td>${esc(e.category_minor)}</td><td>${esc(e.start_time_real)}</td><td>${esc(e.end_time_real)}</td><td>${fmt(e.start_time_rel_s)}</td><td>${fmt(e.ttfb_ms)}</td><td>${fmt(e.ttft_ms)}</td><td>${fmt(e.latency_ms)}</td><td>${fmt(e.tpot_ms_per_token)}</td><td>${e.input_tokens}</td><td>${e.output_tokens}</td><td>${esc(e.flow_key)}</td></tr>`
      ).join('');
    }

    document.getElementById('refresh-btn').onclick = refresh;

    document.getElementById('upload-form').onsubmit = async (e) => {
      e.preventDefault();
      const form = new FormData(e.target);
      const res = await fetch('/api/upload', {method: 'POST', body: form});
      const data = await res.json();
      document.getElementById('op-msg').textContent = `上传完成，新增 ${data.inserted ?? 0} 条 entry。`;
      await refresh();
    };

    document.getElementById('clear-entry-btn').onclick = async () => {
      await fetch('/api/clear', {method: 'POST'});
      document.getElementById('op-msg').textContent = '已清空 entry 记录（序号已重置）。';
      await refresh();
    };

    document.getElementById('cfg-form').onsubmit = async (e) => {
      e.preventDefault();
      const form = new FormData(e.target);
      await fetch('/api/self-hosted', {method: 'POST', body: form});
      e.target.reset();
      await loadConfigs();
    };

    document.getElementById('clear-cfg-btn').onclick = async () => {
      await fetch('/api/self-hosted/clear', {method: 'POST'});
      await loadConfigs();
    };

    loadConfigs();
    refresh();
  </script>
</body>
</html>
